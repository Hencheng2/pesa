<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Google Messages · Account Settings</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: #121217;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            font-family: 'Google Sans', 'Roboto', system-ui, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif;
            /* FIXED: body should not scroll on its own; container handles scrolling only when needed */
            overflow: hidden;
            height: 100vh;
        }

        /* main container: fixed viewport height, scroll only when content overflows (dropdown expanded) */
        .account-container {
            width: 100%;
            max-width: 460px;   /* reduced card width overall */
            margin: 0 auto;
            background-color: #121217;
            height: 100vh;
            display: flex;
            flex-direction: column;
            position: relative;
            overflow-y: auto;
            overflow-x: hidden;
            scrollbar-width: thin;
        }
        .account-container::-webkit-scrollbar {
            width: 4px;
            background: transparent;
        }
        .account-container::-webkit-scrollbar-thumb {
            background: #3C3F52;
            border-radius: 10px;
        }

        /* FIXED HEADER: sticky at top, never scrolls away */
        .fixed-header-area {
            position: sticky;
            top: 0;
            background-color: #121217;
            z-index: 20;
            padding: 20px 20px 12px 20px;   /* reduced padding */
            transition: all 0.2s ease;
        }

        /* SMALLER PROFILE CIRCLE */
        .profile-pic-wrapper {
            position: relative;
            width: 88px;          /* reduced from 120px */
            height: 88px;
            margin: 0 auto 10px auto;
            cursor: pointer;
            transition: all 0.25s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }
        .profile-circle {
            width: 88px;
            height: 88px;
            background-color: #2B2D36;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 44px;      /* icon size reduced */
            color: #BDC1D0;
            border: 2px solid rgba(255,255,255,0.1);
            transition: all 0.2s;
        }
        .camera-icon {
            position: absolute;
            bottom: 2px;
            right: 2px;
            background-color: #70B9FF;
            border-radius: 50%;
            width: 28px;
            height: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            color: #121212;
            border: 2px solid #121217;
            cursor: pointer;
            transition: transform 0.1s;
        }
        .camera-icon:active {
            transform: scale(0.92);
        }

        /* email + greeting */
        .email-header {
            text-align: center;
            margin-bottom: 10px;
            width: 100%;
        }
        .email-address {
            font-size: 22px;      /* slightly smaller */
            font-weight: 500;
            color: #F0F2F8;
            letter-spacing: -0.3px;
            word-break: break-all;
        }
        .greeting {
            font-size: 18px;
            font-weight: 500;
            color: #E9EDF2;
            text-align: center;
            margin-bottom: 6px;
        }

        /* COMPACT NAVBAR — appears on scroll, profile pic + email on the same row, left side */
        .compact-navbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background-color: rgba(18, 18, 23, 0.96);
            backdrop-filter: blur(10px);
            padding: 8px 16px;
            border-radius: 40px;
            margin-top: 0;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.2s, visibility 0.2s;
            position: fixed;
            top: 8px;
            left: 50%;
            transform: translateX(-50%);
            width: calc(100% - 32px);
            max-width: 420px;
            pointer-events: none;
            z-index: 30;
            border: 0.5px solid rgba(255,255,255,0.05);
        }
        .compact-navbar.show {
            opacity: 1;
            visibility: visible;
            pointer-events: auto;
        }
        .compact-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .compact-avatar {
            width: 36px;
            height: 36px;
            background-color: #2B2D36;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            color: #BDC1D0;
        }
        .compact-email {
            font-size: 15px;
            font-weight: 500;
            color: #F0F2F8;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 200px;
        }
        .compact-menu-icon {
            color: #A5A9C2;
            font-size: 18px;
        }

        /* scrollable content area — cards width reduced (max-width inline) */
        .scrollable-content {
            flex: 1;
            padding: 0 16px 32px 16px;  /* less horizontal padding => cards narrower */
            transition: margin-top 0.2s;
        }

        /* menu cards: reduced width due to container max-width and padding */
        .menu-card {
            background-color: #1C1D26;
            border-radius: 24px;    /* slightly smaller radius */
            width: 100%;
            margin-bottom: 14px;
            overflow: hidden;
            border: 0.5px solid rgba(255,255,255,0.04);
        }

        .menu-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 18px;     /* reduced padding */
            cursor: pointer;
            transition: background 0.12s;
            border-bottom: 0.5px solid rgba(255,255,255,0.05);
        }
        .menu-item:active {
            background-color: #2A2D38;
        }
        .menu-item-left {
            display: flex;
            align-items: center;
            gap: 16px;
        }
        .menu-icon {
            width: 28px;
            font-size: 20px;
            color: #BAC0DC;
            text-align: center;
        }
        .menu-label {
            font-size: 16px;
            font-weight: 500;
            color: #F0F2F8;
            letter-spacing: -0.2px;
        }

        /* Switch account card custom layout */
        .switch-left-label {
            flex: 1;
        }
        .switch-right-controls {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .account-count-badge {
            background-color: #3C3F52;
            color: white;
            font-size: 13px;
            font-weight: 600;
            border-radius: 40px;
            min-width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 10px;
            font-family: monospace;
        }
        .dropdown-chevron {
            font-size: 18px;
            color: #A5A9C2;
            transition: transform 0.2s;
            cursor: pointer;
            width: 28px;
            text-align: center;
        }
        .dropdown-chevron.rotated {
            transform: rotate(180deg);
        }

        /* Dropdown list container - pushes content down when open */
        .account-dropdown-container {
            width: 100%;
            background-color: #1C1D26;
            border-radius: 0 0 24px 24px;
            overflow: hidden;
            max-height: 0;
            transition: max-height 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            margin-bottom: 0;
        }
        .account-dropdown-container.open {
            max-height: 600px;   /* enough for many accounts, scroll inside container? but overall page scrolls */
            margin-bottom: 0;
        }
        .dropdown-account-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 18px;
            border-top: 0.5px solid rgba(255,255,255,0.05);
            cursor: pointer;
            transition: background 0.1s;
        }
        .dropdown-account-item:active {
            background-color: #2A2D38;
        }
        .dropdown-account-info {
            display: flex;
            align-items: center;
            gap: 14px;
            flex: 1;
        }
        .dropdown-avatar {
            width: 40px;
            height: 40px;
            background-color: #3C3F52;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            font-weight: 600;
            color: #CFD4E6;
            flex-shrink: 0;
        }
        .dropdown-name-email {
            display: flex;
            flex-direction: column;
        }
        .dropdown-username {
            font-size: 15px;
            font-weight: 500;
            color: #F0F2F8;
        }
        .dropdown-email-small {
            font-size: 11px;
            color: #8E93AE;
            margin-top: 2px;
        }
        .info-icon-dropdown {
            color: #70B9FF;
            font-size: 16px;
            width: 28px;
            text-align: center;
            opacity: 0.8;
        }

        /* manage card */
        .manage-card-centered {
            background-color: #1C1D26;
            border-radius: 30px;
            width: 100%;
            padding: 14px 18px;
            text-align: center;
            cursor: pointer;
            transition: background 0.12s;
            margin-bottom: 14px;
            border: 0.5px solid rgba(255,255,255,0.04);
        }
        .manage-text {
            font-size: 16px;
            font-weight: 500;
            color: #F0F2F8;
        }

        .section-header {
            width: 100%;
            margin: 16px 0 10px 0;
            padding-left: 6px;
        }
        .section-title {
            font-size: 13px;
            font-weight: 600;
            color: #A5A9C2;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .menu-item:last-child {
            border-bottom: none;
        }

        .footer-links {
            width: 100%;
            margin-top: 28px;
            text-align: center;
            padding: 12px 0 20px;
            font-size: 12px;
            color: #8E93AE;
        }
        .footer-links a {
            color: #8E9AFF;
            text-decoration: none;
            font-weight: 500;
            margin: 0 6px;
        }

        /* Fix for data in messages icon (shield/privacy) */
        .fa-shield-alt {
            font-size: 20px;
        }

        @media (max-width: 480px) {
            .fixed-header-area {
                padding: 16px 16px 10px 16px;
            }
            .scrollable-content {
                padding: 0 12px 32px 12px;
            }
            .profile-pic-wrapper {
                width: 76px;
                height: 76px;
            }
            .profile-circle {
                width: 76px;
                height: 76px;
                font-size: 38px;
            }
            .email-address {
                font-size: 20px;
            }
            .compact-navbar {
                width: calc(100% - 24px);
            }
        }
    </style>
</head>
<body>
<div class="account-container" id="accountContainer">
    <!-- Fixed header area: sticky, contains email, smaller profile, greeting -->
    <div class="fixed-header-area" id="fixedHeaderArea">
        <div class="email-header">
            <div class="email-address">hochieng86@gmail.com</div>
        </div>
        <div class="profile-pic-wrapper" id="profilePicWrapper">
            <div class="profile-circle">
                <i class="fas fa-user-circle"></i>
            </div>
            <div class="camera-icon" id="cameraIcon">
                <i class="fas fa-camera"></i>
            </div>
        </div>
        <div class="greeting">Hi, Sir!</div>
    </div>

    <!-- Compact navbar (appears on scroll) with avatar + email on left side -->
    <div class="compact-navbar" id="compactNavbar">
        <div class="compact-left">
            <div class="compact-avatar">
                <i class="fas fa-user-circle"></i>
            </div>
            <div class="compact-email" id="compactEmail">hochieng86@gmail.com</div>
        </div>
        <div class="compact-menu-icon">
            <i class="fas fa-chevron-down"></i>
        </div>
    </div>

    <!-- Scrollable content area -->
    <div class="scrollable-content" id="scrollableContent">
        <!-- Manage your Google Account -->
        <div class="manage-card-centered" id="manageAccountBtn">
            <span class="manage-text">Manage your Google Account</span>
        </div>

        <!-- SWITCH ACCOUNT CARD -->
        <div class="menu-card" id="switchAccountCard">
            <div class="menu-item" id="switchAccountMainRow">
                <div class="menu-item-left switch-left-label">
                  <span class="menu-label">Switch account</span>
                </div>
                <div class="switch-right-controls">
                    <div class="account-count-badge" id="accountCountBadge">17</div>
                    <div class="dropdown-chevron" id="dropdownChevron">
                        <i class="fas fa-chevron-down"></i>
                    </div>
                </div>
            </div>
            <!-- dropdown list container -->
            <div class="account-dropdown-container" id="accountDropdownContainer">
                <!-- injected accounts via JS -->
            </div>
        </div>

        <!-- More from this app section -->
        <div class="section-header">
            <div class="section-title">More from this app</div>
        </div>

        <div class="menu-card">
            <div class="menu-item" id="profileBtn">
                <div class="menu-item-left">
                    <div class="menu-icon"><i class="fas fa-user-circle"></i></div>
                    <span class="menu-label">Your profile</span>
                </div>
            </div>
            <div class="menu-item" id="archivedBtn">
                <div class="menu-item-left">
                    <div class="menu-icon"><i class="fas fa-archive"></i></div>
                    <span class="menu-label">Archived</span>
                </div>
            </div>
            <div class="menu-item" id="trashBtn">
                <div class="menu-item-left">
                    <div class="menu-icon"><i class="fas fa-trash-alt"></i></div>
                    <span class="menu-label">Trash</span>
                </div>
            </div>
            <div class="menu-item" id="spamBtn">
                <div class="menu-item-left">
                    <div class="menu-icon"><i class="fas fa-ban"></i></div>
                    <span class="menu-label">Spam and blocked</span>
                </div>
            </div>
            <div class="menu-item" id="markReadBtn">
                <div class="menu-item-left">
                    <div class="menu-icon"><i class="fas fa-envelope-open-text"></i></div>
                    <span class="menu-label">Mark all as read</span>
                </div>
            </div>
            <div class="menu-item" id="devicePairingBtn">
                <div class="menu-item-left">
                    <div class="menu-icon"><i class="fas fa-mobile-alt"></i></div>
                    <span class="menu-label">Device pairing</span>
                </div>
            </div>
        </div>

        <div class="menu-card">
            <!-- Fixed: "Your data in Messages" with shield icon (privacy) -->
            <div class="menu-item" id="dataInMessagesBtn">
                <div class="menu-item-left">
                    <div class="menu-icon"><i class="fas fa-shield-alt"></i></div>
                    <span class="menu-label">Your data in Messages</span>
                </div>
            </div>
            <div class="menu-item" id="messagesSettingsBtn">
                <div class="menu-item-left">
                    <div class="menu-icon"><i class="fas fa-sliders-h"></i></div>
                    <span class="menu-label">Messages settings</span>
                </div>
            </div>
            <div class="menu-item" id="helpFeedbackBtn">
                <div class="menu-item-left">
                    <div class="menu-icon"><i class="fas fa-question-circle"></i></div>
                    <span class="menu-label">Help and feedback</span>
                </div>
            </div>
        </div>

        <div class="footer-links">
            <a href="#" id="privacyLink">Privacy Policy</a>
            <span>•</span>
            <a href="#" id="termsLink">Terms of Service</a>
        </div>
    </div>
</div>

<script>
    (function() {
        // Helper: press feedback
        function addPressEffect(element, logMessage) {
            if (!element) return;
            element.addEventListener('click', (e) => {
                e.stopPropagation();
                console.log(logMessage);
                const originalTransition = element.style.transition;
                element.style.backgroundColor = '#2C2F3E';
                setTimeout(() => element.style.backgroundColor = '', 130);
            });
        }

        // Generate 17 placeholder accounts for dropdown
        const accounts = [];
        const firstNames = ["Alex", "Jamie", "Taylor", "Morgan", "Casey", "Riley", "Jordan", "Sasha", "Dakota", "Quinn", "Blake", "Avery", "Cameron", "Emerson", "Finley", "Harper", "Logan"];
        const domains = ["gmail.com", "googlemail.com", "outlook.com", "yahoo.com"];
        
        for (let i = 1; i <= 17; i++) {
            let name = firstNames[(i-1) % firstNames.length] + (i > firstNames.length ? i : "");
            let email = `${name.toLowerCase()}@${domains[i % domains.length]}`;
            accounts.push({ username: name, email: email, initial: name.charAt(0).toUpperCase() });
        }
        
        const dropdownContainer = document.getElementById('accountDropdownContainer');
        function buildDropdownList() {
            if (!dropdownContainer) return;
            dropdownContainer.innerHTML = '';
            accounts.forEach((acc, idx) => {
                const item = document.createElement('div');
                item.className = 'dropdown-account-item';
                item.setAttribute('data-account-index', idx);
                item.innerHTML = `
                    <div class="dropdown-account-info">
                        <div class="dropdown-avatar">${acc.initial}</div>
                        <div class="dropdown-name-email">
                            <div class="dropdown-username">${acc.username}</div>
                            <div class="dropdown-email-small">${acc.email}</div>
                        </div>
                    </div>
                    <div class="info-icon-dropdown"><i class="fas fa-info-circle"></i></div>
                `;
                item.addEventListener('click', (e) => {
                    e.stopPropagation();
                    console.log(`[Account Dropdown] Clicked: ${acc.username} (${acc.email}) - placeholder`);
                    item.style.backgroundColor = '#2A2D38';
                    setTimeout(() => item.style.backgroundColor = '', 150);
                });
                dropdownContainer.appendChild(item);
            });
        }
        buildDropdownList();

        // count badge
        const countBadge = document.getElementById('accountCountBadge');
        if (countBadge) {
            const total = accounts.length;
            countBadge.innerText = total > 10 ? '10+' : total.toString();
        }

        // Dropdown toggle logic: open/close with chevron rotation, pushes content down -> page becomes scrollable
        const chevron = document.getElementById('dropdownChevron');
        const dropdownDiv = document.getElementById('accountDropdownContainer');
        let isOpen = false;
        
        function toggleDropdown(event) {
            if (event) event.stopPropagation();
            isOpen = !isOpen;
            if (isOpen) {
                dropdownDiv.classList.add('open');
                chevron.classList.add('rotated');
                // after opening, if the container overflows, scrolling is natural
                console.log('[Dropdown] Opened - accounts list visible, page scrolls if needed');
            } else {
                dropdownDiv.classList.remove('open');
                chevron.classList.remove('rotated');
                console.log('[Dropdown] Closed');
            }
        }
        
        if (chevron) {
            chevron.addEventListener('click', toggleDropdown);
        }
        // main row click (non-chevron) just logs
        const mainRow = document.getElementById('switchAccountMainRow');
        if (mainRow) {
            mainRow.addEventListener('click', (e) => {
                if (!e.target.closest('.dropdown-chevron')) {
                    console.log('[Account] Switch account row clicked (non-chevron) - placeholder');
                    const originalBg = mainRow.style.backgroundColor;
                    mainRow.style.backgroundColor = '#2C2F3E';
                    setTimeout(() => mainRow.style.backgroundColor = '', 130);
                }
            });
        }
        
        // ========== SCROLL SHRINK LOGIC: Profile circle moves to navbar (left side) and email moves to navbar ==========
        const fixedHeader = document.getElementById('fixedHeaderArea');
        const compactNav = document.getElementById('compactNavbar');
        const profileWrapper = document.getElementById('profilePicWrapper');
        const profileCircle = document.querySelector('.profile-circle');
        const cameraIconElem = document.getElementById('cameraIcon');
        const emailHeaderDiv = document.querySelector('.email-address');
        const greetingDiv = document.querySelector('.greeting');
        const compactEmailSpan = document.getElementById('compactEmail');
        
        let shrinkActive = false;
        
        // When scrolled: profile circle becomes part of compact navbar (visually hidden in header and appears in navbar)
        // We do NOT duplicate the profile — we shrink the header profile, hide greeting, and show compact navbar that includes avatar + email.
        // Also the email in header becomes smaller, but the navbar takes over with email and profile pic on left.
        function handleScroll() {
            // Get scroll from the container (since body overflow hidden, the container scrolls)
            const container = document.getElementById('accountContainer');
            const scrollY = container ? container.scrollTop : (window.scrollY || document.documentElement.scrollTop);
            
            if (scrollY > 20 && !shrinkActive) {
                shrinkActive = true;
                // shrink profile wrapper in header (make it smaller)
                if (profileWrapper) {
                    profileWrapper.style.width = '48px';
                    profileWrapper.style.height = '48px';
                    profileWrapper.style.margin = '0 auto 4px auto';
                    if (profileCircle) {
                        profileCircle.style.width = '48px';
                        profileCircle.style.height = '48px';
                        profileCircle.style.fontSize = '26px';
                    }
                    if (cameraIconElem) cameraIconElem.style.transform = 'scale(0.6)';
                }
                // hide greeting
                if (greetingDiv) greetingDiv.style.display = 'none';
                // shrink email font
                if (emailHeaderDiv) emailHeaderDiv.style.fontSize = '16px';
                if (emailHeaderDiv) emailHeaderDiv.style.opacity = '0.7';
                // show compact navbar
                if (compactNav) compactNav.classList.add('show');
                // update compact email text
                if (compactEmailSpan) compactEmailSpan.innerText = 'hochieng86@gmail.com';
                // adjust header bottom padding
                if (fixedHeader) fixedHeader.style.paddingBottom = '6px';
            } 
            else if (scrollY <= 20 && shrinkActive) {
                shrinkActive = false;
                if (profileWrapper) {
                    profileWrapper.style.width = '';
                    profileWrapper.style.height = '';
                    profileWrapper.style.margin = '';
                    if (profileCircle) {
                        profileCircle.style.width = '';
                        profileCircle.style.height = '';
                        profileCircle.style.fontSize = '';
                    }
                    if (cameraIconElem) cameraIconElem.style.transform = '';
                }
                if (greetingDiv) greetingDiv.style.display = '';
                if (emailHeaderDiv) {
                    emailHeaderDiv.style.fontSize = '';
                    emailHeaderDiv.style.opacity = '';
                }
                if (compactNav) compactNav.classList.remove('show');
                if (fixedHeader) fixedHeader.style.paddingBottom = '';
            }
        }
        
        // Attach scroll event to the scrollable container (account-container)
        const scrollContainer = document.getElementById('accountContainer');
        if (scrollContainer) {
            scrollContainer.addEventListener('scroll', handleScroll);
            handleScroll(); // initial
        } else {
            window.addEventListener('scroll', handleScroll);
            handleScroll();
        }
        
        // Ensure that when dropdown opens, scroll container remains interactive
        // No extra needed
        
        // Press effects for all interactive elements
        addPressEffect(document.getElementById('manageAccountBtn'), '[Account] Manage your Google Account — placeholder');
        addPressEffect(document.getElementById('profileBtn'), '[Account] Your profile — placeholder');
        addPressEffect(document.getElementById('archivedBtn'), '[Account] Archived — placeholder');
        addPressEffect(document.getElementById('trashBtn'), '[Account] Trash — placeholder');
        addPressEffect(document.getElementById('spamBtn'), '[Account] Spam and blocked — placeholder');
        addPressEffect(document.getElementById('markReadBtn'), '[Account] Mark all as read — placeholder');
        addPressEffect(document.getElementById('devicePairingBtn'), '[Account] Device pairing — placeholder');
        addPressEffect(document.getElementById('dataInMessagesBtn'), '[Account] Your data in Messages — privacy shield placeholder');
        addPressEffect(document.getElementById('messagesSettingsBtn'), '[Account] Messages settings — placeholder');
        addPressEffect(document.getElementById('helpFeedbackBtn'), '[Account] Help and feedback — placeholder');
        
        // Profile picture & camera interactions
        const profilePicWrapperDiv = document.getElementById('profilePicWrapper');
        const cameraBtn = document.getElementById('cameraIcon');
        if (profilePicWrapperDiv) {
            profilePicWrapperDiv.addEventListener('click', (e) => {
                if (e.target === cameraBtn || cameraBtn.contains(e.target)) return;
                console.log('[Profile] Profile picture clicked — change avatar placeholder');
                profilePicWrapperDiv.style.opacity = '0.8';
                setTimeout(() => profilePicWrapperDiv.style.opacity = '1', 150);
            });
        }
        if (cameraBtn) {
            cameraBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                console.log('[Camera] Change profile picture clicked — open image picker placeholder');
                cameraBtn.style.transform = 'scale(0.9)';
                setTimeout(() => cameraBtn.style.transform = '', 150);
            });
        }
        
        // footer links
        const privacyLink = document.getElementById('privacyLink');
        const termsLink = document.getElementById('termsLink');
        if (privacyLink) {
            privacyLink.addEventListener('click', (e) => {
                e.preventDefault();
                console.log('[Footer] Privacy Policy clicked — placeholder');
            });
        }
        if (termsLink) {
            termsLink.addEventListener('click', (e) => {
                e.preventDefault();
                console.log('[Footer] Terms of Service clicked — placeholder');
            });
        }
        
        // Additional: reduce card widths via container max-width, already set
        console.log('Final UI: Smaller profile circle, reduced card width, fixed scroll only when dropdown expands, compact navbar shows profile + email on left on scroll, shield icon for data privacy.');
    })();
</script>
